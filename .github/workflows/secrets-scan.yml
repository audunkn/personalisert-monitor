name: Secrets Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  trufflehog:
    name: Skann etter secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
